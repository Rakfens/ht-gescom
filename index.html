<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Vueport optimisé pour mobile et PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- SEO et description -->
    <meta name="description" content="Aterinay Services - Solution complète de gestion pour services de livraison, boutiques accessoires et articles bébé" />
    <meta name="keywords" content="gestion, livraison, stock, ventes, Madagascar, boutique, accessoires téléphone, articles bébé" />
    <meta name="author" content="Aterinay Services" />
    <meta http-equiv="Content-Security-Policy" content="font-src * data: blob:;">
    
    <!-- Thème (sera mis à jour dynamiquement par l'app) -->
    <meta name="theme-color" content="#0b1120" id="theme-color" />
    
    <!-- PWA / Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HT-GesCom" />
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    
    <title>HT-GesCom - Gestion multi-sociétés</title>
    
    <style>
      /* Éviter le flash de contenu non stylé */
      #root {
        min-height: 100vh;
      }
    </style>
    <script>
    // Watchdog : détecte si l'app s'est bloquée au dernier démarrage
    (function () {
      var BOOT_KEY = '__ht_gescom_boot__';
      var BOOT_TIMEOUT = 12000; // 12 secondes
      var last = parseInt(sessionStorage.getItem(BOOT_KEY) || '0');
      var now = Date.now();

     if (last && (now - last) < BOOT_TIMEOUT) {
      // Démarrage précédent incomplet → nettoyage d'urgence
      console.warn('[HT-GesCom] Démarrage précédent incomplet. Nettoyage...');
      try { localStorage.clear(); } catch(e) {}
      try { sessionStorage.clear(); } catch(e) {}
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      // Ne pas remettre la clé pour éviter une boucle infinie
      return;
    }

    sessionStorage.setItem(BOOT_KEY, String(now));

    window.addEventListener('load', function () {
      sessionStorage.removeItem(BOOT_KEY); // succès → on efface le marqueur
    });
    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
